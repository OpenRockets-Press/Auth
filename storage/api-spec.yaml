openapi: 3.1.0
info:
  title: Auth System API
  description: |
    A GDPR/COPPA-compliant identity provider with OAuth 2.1/OIDC, minor parental consent flows,
    verified app ecosystem, and cross-app data hub (RFC 8693 Token Exchange).
  version: 1.0.0
  contact:
    name: Auth System Team
  license:
    name: MIT

servers:
  - url: https://auth.example.com
    description: Production
  - url: http://localhost:8000
    description: Local development

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: OAuth
    description: OAuth 2.1/OIDC application management
  - name: Compliance
    description: GDPR/COPPA compliance and parental consent
  - name: Data Hub
    description: Cross-app data storage and sharing (RFC 8693)
  - name: Social
    description: Social login and account linking
  - name: Admin
    description: Admin panel endpoints

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, example: Bearer }
                  expires_in: { type: integer }
                  user:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      email: { type: string }
        401:
          description: Invalid credentials
        429:
          description: Account locked

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        201:
          description: Registration successful

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke current token
      responses:
        200:
          description: Logged out successfully

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        200:
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/2fa/enable:
    post:
      tags: [Auth]
      summary: Enable two-factor authentication
      responses:
        200:
          description: 2FA setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  qr_code_url: { type: string }

  /api/2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirm 2FA setup with verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, pattern: '^\d{6}$' }
      responses:
        200:
          description: 2FA confirmed

  /api/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable two-factor authentication
      responses:
        200:
          description: 2FA disabled

  /api/2fa/recovery-codes:
    get:
      tags: [Auth]
      summary: Get 2FA recovery codes
      responses:
        200:
          description: Recovery codes

  /api/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      responses:
        200:
          description: List of sessions

  /api/sessions/{tokenId}:
    delete:
      tags: [Auth]
      summary: Revoke a specific session
      parameters:
        - name: tokenId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Session revoked

  /api/apps:
    get:
      tags: [OAuth]
      summary: List user's OAuth applications
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, verified, rejected, suspended] }
      responses:
        200:
          description: List of apps
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/App'
    post:
      tags: [OAuth]
      summary: Register a new OAuth application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInput'
      responses:
        201:
          description: App created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'

  /api/apps/{app}:
    get:
      tags: [OAuth]
      summary: Get app details
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: App details
    put:
      tags: [OAuth]
      summary: Update app
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInput'
      responses:
        200:
          description: App updated

  /api/apps/{app}/regenerate-secret:
    post:
      tags: [OAuth]
      summary: Regenerate client secret
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Secret regenerated

  /api/consent/my:
    get:
      tags: [OAuth]
      summary: List user's active consents
      responses:
        200:
          description: List of consents

  /api/consent/{app}/grant:
    post:
      tags: [OAuth]
      summary: Grant consent to an app
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scopes]
              properties:
                scopes:
                  type: array
                  items: { type: string }
      responses:
        201:
          description: Consent granted

  /api/consent/{record}:
    delete:
      tags: [OAuth]
      summary: Revoke a consent
      parameters:
        - name: record
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Consent revoked

  /api/.well-known/openid-configuration:
    get:
      tags: [OAuth]
      summary: OIDC discovery endpoint
      security: []
      responses:
        200:
          description: OIDC configuration

  /oauth/authorize:
    get:
      tags: [OAuth]
      summary: OAuth authorization endpoint
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema: { type: string, enum: [code] }
        - name: client_id
          in: query
          required: true
          schema: { type: string }
        - name: redirect_uri
          in: query
          required: true
          schema: { type: string }
        - name: scope
          in: query
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
        - name: code_challenge
          in: query
          required: true
          schema: { type: string }
        - name: code_challenge_method
          in: query
          schema: { type: string, enum: [S256] }
      responses:
        302:
          description: Redirect to authorization or consent screen

  /oauth/token:
    post:
      tags: [OAuth]
      summary: OAuth token endpoint
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id, redirect_uri]
              properties:
                grant_type: { type: string, enum: [authorization_code, refresh_token] }
                client_id: { type: string }
                client_secret: { type: string }
                code: { type: string }
                redirect_uri: { type: string }
                code_verifier: { type: string }
                refresh_token: { type: string }
      responses:
        200:
          description: Token response

  /oauth/token/refresh:
    post:
      tags: [OAuth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        200:
          description: New token

  /api/compliance/countries:
    get:
      tags: [Compliance]
      summary: List all countries with legislation data
      security: []
      responses:
        200:
          description: List of countries

  /api/compliance/country/{code}:
    get:
      tags: [Compliance]
      summary: Get country legislation info
      security: []
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, minLength: 2, maxLength: 2 }
      responses:
        200:
          description: Country data

  /api/compliance/profile:
    get:
      tags: [Compliance]
      summary: Get user's compliance profile
      responses:
        200:
          description: User profile
    post:
      tags: [Compliance]
      summary: Set user's compliance profile (DOB, country)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date_of_birth, country_code]
              properties:
                date_of_birth: { type: string, format: date }
                country_code: { type: string, minLength: 2, maxLength: 2 }
      responses:
        201:
          description: Profile created

  /api/compliance/parental-consent/request:
    post:
      tags: [Compliance]
      summary: Request parental consent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parent_email]
              properties:
                parent_email: { type: string, format: email }
                parent_name: { type: string }
      responses:
        201:
          description: Consent request sent

  /api/consent/verify/{token}:
    post:
      tags: [Compliance]
      summary: Respond to parental consent request
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [grant, deny] }
      responses:
        200:
          description: Consent response recorded

  /api/compliance/data-export:
    post:
      tags: [Compliance]
      summary: Request data export (GDPR right to portability)
      responses:
        201:
          description: Export request created

  /api/compliance/data-deletion:
    post:
      tags: [Compliance]
      summary: Request data deletion (GDPR right to erasure)
      responses:
        201:
          description: Deletion request created

  /api/compliance/data-export/{dataRequest}/download:
    get:
      tags: [Compliance]
      summary: Download data export
      parameters:
        - name: dataRequest
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Export data

  /api/compliance/data-requests:
    get:
      tags: [Compliance]
      summary: List user's data requests
      responses:
        200:
          description: List of requests

  /api/data-hub/{app}/store:
    post:
      tags: [Data Hub]
      summary: Store user data for an app
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key: { type: string, pattern: '^[a-zA-Z0-9._-]+$' }
                value: {}
      responses:
        201:
          description: Data stored

  /api/data-hub/{app}/data:
    get:
      tags: [Data Hub]
      summary: Get all stored data for an app
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: All stored data

  /api/data-hub/{app}/data/{key}:
    get:
      tags: [Data Hub]
      summary: Get specific stored data
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Data value
    delete:
      tags: [Data Hub]
      summary: Delete specific stored data
      responses:
        200:
          description: Data deleted

  /api/data-hub/{app}/request-sharing:
    post:
      tags: [Data Hub]
      summary: Request data sharing from another app
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_app_id, data_keys]
              properties:
                target_app_id: { type: integer }
                data_keys:
                  type: array
                  items: { type: string }
      responses:
        201:
          description: Data sharing request created

  /api/data-hub/{app}/exchange-token:
    post:
      tags: [Data Hub]
      summary: Exchange token for data access (RFC 8693)
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [granting_app_id, scopes]
              properties:
                granting_app_id: { type: integer }
                scopes:
                  type: array
                  items: { type: string }
      responses:
        200:
          description: Access token issued

  /api/data-hub/access/{userId}:
    get:
      tags: [Data Hub]
      summary: Access shared data with token
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Shared data

  /api/data-hub/agreements:
    get:
      tags: [Data Hub]
      summary: List user's data sharing agreements
      responses:
        200:
          description: List of agreements

  /api/data-hub/agreements/{agreementId}:
    delete:
      tags: [Data Hub]
      summary: Revoke a data sharing agreement
      parameters:
        - name: agreementId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Agreement revoked

  /api/data-hub/requests/{dataRequest}/grant:
    post:
      tags: [Data Hub]
      summary: Grant data sharing consent
      parameters:
        - name: dataRequest
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Consent granted

  /api/data-hub/requests/{dataRequest}/deny:
    post:
      tags: [Data Hub]
      summary: Deny data sharing consent
      responses:
        200:
          description: Consent denied

  /api/social/{provider}/redirect:
    get:
      tags: [Social]
      summary: Get social auth redirect URL
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, apple, github, microsoft, facebook, twitter] }
      responses:
        200:
          description: Redirect URL

  /api/social/{provider}/callback:
    get:
      tags: [Social]
      summary: Social auth callback
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        200:
          description: Login successful

  /api/social/link:
    post:
      tags: [Social]
      summary: Link social account to existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, code]
              properties:
                provider: { type: string }
                code: { type: string }
      responses:
        200:
          description: Account linked

  /api/social/{provider}:
    delete:
      tags: [Social]
      summary: Unlink social account
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Account unlinked

  /api/social/accounts:
    get:
      tags: [Social]
      summary: List linked social accounts
      responses:
        200:
          description: List of accounts

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List users (admin)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        200:
          description: List of users

  /api/admin/users/{user}:
    get:
      tags: [Admin]
      summary: Get user details (admin)
      parameters:
        - name: user
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: User details

  /api/admin/users/{user}/suspend:
    post:
      tags: [Admin]
      summary: Suspend user (admin)
      parameters:
        - name: user
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: User suspended

  /api/admin/users/{user}/unsuspend:
    post:
      tags: [Admin]
      summary: Unsuspend user (admin)
      responses:
        200:
          description: User unsuspended

  /api/admin/users/{user}/impersonate:
    post:
      tags: [Admin]
      summary: Impersonate user (admin)
      parameters:
        - name: user
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Now impersonating

  /api/admin/impersonate/stop:
    post:
      tags: [Admin]
      summary: Stop impersonation
      responses:
        200:
          description: Stopped impersonation

  /api/admin/apps:
    get:
      tags: [Admin]
      summary: List all apps (admin)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
      responses:
        200:
          description: List of apps

  /api/admin/apps/{app}/verify:
    post:
      tags: [Admin]
      summary: Verify app (admin)
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: App verified

  /api/admin/apps/{app}/reject:
    post:
      tags: [Admin]
      summary: Reject app (admin)
      responses:
        200:
          description: App rejected

  /api/admin/apps/{app}/suspend:
    post:
      tags: [Admin]
      summary: Suspend app (admin)
      responses:
        200:
          description: App suspended

  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: List audit logs (admin)
      parameters:
        - name: event_type
          in: query
          schema: { type: string }
        - name: user_id
          in: query
          schema: { type: integer }
        - name: app_id
          in: query
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        200:
          description: List of audit logs

  /api/admin/data-requests:
    get:
      tags: [Admin]
      summary: List all data requests (admin)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: request_type
          in: query
          schema: { type: string }
      responses:
        200:
          description: List of data requests

  /api/admin/data-requests/{dataRequest}/fulfill:
    post:
      tags: [Admin]
      summary: Fulfill a data request (admin)
      parameters:
        - name: dataRequest
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Request fulfilled

  /api/admin/analytics:
    get:
      tags: [Admin]
      summary: Get dashboard analytics (admin)
      responses:
        200:
          description: Analytics data

  /api/admin/countries:
    get:
      tags: [Admin]
      summary: List countries (admin)
      responses:
        200:
          description: List of countries

  /api/admin/countries/{code}:
    put:
      tags: [Admin]
      summary: Update country legislation rules (admin)
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                age_of_digital_consent: { type: integer }
                gdpr_applicable: { type: boolean }
                coppa_applicable: { type: boolean }
                data_retention_days: { type: integer }
                requires_parental_consent_below_age: { type: integer }
      responses:
        200:
          description: Country updated

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        email_verified_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [active, suspended] }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    App:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        icon_url: { type: string, nullable: true }
        status: { type: string, enum: [pending, verified, rejected, suspended] }
        is_system: { type: boolean }
        redirect_uris:
          type: array
          items: { type: string }
        homepage_url: { type: string, nullable: true }
        privacy_policy_url: { type: string, nullable: true }
        terms_url: { type: string, nullable: true }
        category: { type: string, nullable: true }
        verified_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AppInput:
      type: object
      required: [name, redirect_uris]
      properties:
        name: { type: string }
        description: { type: string }
        icon_url: { type: string }
        redirect_uris:
          type: array
          items: { type: string, format: uri }
          minItems: 1
        homepage_url: { type: string }
        privacy_policy_url: { type: string }
        terms_url: { type: string }
        category: { type: string }
